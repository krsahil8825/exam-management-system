{% load static tailwind_tags %}

<!DOCTYPE html>
<html lang="en" class="dark">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{{ status_code }} | {{ title }} | EMS</title>

        {% tailwind_css %}

        <!-- DaisyUI theme -->
        <script>
            document.documentElement.setAttribute("data-theme", "dark");

            (function () {
                const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
                if (prefersLight) {
                    document.documentElement.classList.remove("dark");
                    document.documentElement.setAttribute("data-theme", "light");
                } else {
                    document.documentElement.classList.add("dark");
                    document.documentElement.setAttribute("data-theme", "dark");
                }
            })();
        </script>

        <style>
            html {
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
        </style>
    </head>

    <body class="min-h-screen flex flex-col bg-base-200 transition-colors duration-500">

        <!-- ================= HEADER ================= -->
        <header class="navbar bg-base-100 shadow-md px-6">
            <div class="flex-1">
                <a href="/" class="text-xl font-bold tracking-wide text-primary">
                    EMS
                </a>
            </div>
            <div class="flex-none text-sm opacity-70">
                Exam Management System
            </div>
        </header>

        <!-- ================= MAIN CONTENT ================= -->
        <main class="flex-1 flex items-center justify-center px-6 py-12">

            <div class="card w-full max-w-xl bg-base-100 shadow-2xl border border-base-300">

                <div class="card-body text-center">

                    <!-- Status Code -->
                    <h1 class="text-7xl font-extrabold text-primary">
                        {{ status_code }}
                    </h1>

                    <!-- Title -->
                    <h2 class="text-2xl font-semibold mt-4">
                        {{ title }}
                    </h2>

                    <!-- Message -->
                    <p class="mt-4 opacity-80">
                        {{ message }}
                    </p>

                    <div class="divider"></div>

                    <!-- Buttons -->
                    <div class="card-actions justify-center gap-4 mt-4">

                        <a href="/" class="btn btn-primary">
                            Go to Home
                        </a>

                        <button onclick="history.back()" class="btn btn-outline">
                            Go Back
                        </button>

                    </div>

                </div>
            </div>

        </main>

        <!-- ================= FOOTER ================= -->
        <footer class="footer footer-center p-6 bg-base-100 border-t border-base-300 text-base-content">

            <div>
                <p class="font-semibold">
                    EMS — Exam Management System
                </p>
                <p class="text-sm opacity-70">
                    Created by Kumar Sahil
                </p>
            </div>

            <div class="text-xs opacity-50">
                © {% now "Y" %} EMS. All rights reserved.
            </div>

        </footer>

    </body>

</html>
