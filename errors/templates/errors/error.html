<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>{{ status_code }} | {{ title }}</title>

        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
                background-color: #0f172a;
                color: #e5e7eb;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }

            .error-container {
                max-width: 520px;
                text-align: center;
                padding: 40px;
                background-color: #020617;
                border-radius: 12px;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            }

            .status-code {
                font-size: 72px;
                font-weight: 700;
                color: #38bdf8;
                margin-bottom: 10px;
            }

            .title {
                font-size: 24px;
                margin-bottom: 12px;
            }

            .message {
                font-size: 16px;
                color: #cbd5f5;
                margin-bottom: 24px;
                line-height: 1.6;
            }

            .back-link {
                display: inline-block;
                padding: 10px 18px;
                text-decoration: none;
                border-radius: 6px;
                background-color: #38bdf8;
                color: #020617;
                font-weight: 600;
            }

            .back-link:hover {
                background-color: #0ea5e9;
            }
        </style>
    </head>

    <body>
        <div class="error-container">
            <div class="status-code">{{ status_code }}</div>
            <div class="title">{{ title }}</div>
            <div class="message">{{ message }}</div>

            <a href="/" class="back-link">Go to Home</a>
        </div>
    </body>

</html>
